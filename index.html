script>
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Learn Quest - Klasse 9</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --accent-blue: #00d2ff;
            --accent-green: #00f2fe;
            --correct-color: #2ea043;
            --wrong-color: #f85149;
            --text-color: #f0f6fc;
            --text-secondary: #8b949e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .game-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        0 0 50px rgba(0, 210, 255, 0.1);
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 25px;
        }

        .subject-section {
            text-align: left;
            margin-bottom: 25px;
        }

        .subject-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent-blue);
            border-bottom: 1px solid #30363d;
            padding-bottom: 5px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        #score-display {
            color: var(--accent-blue);
        }

        .progress-bar {
            height: 8px;
            background-color: #21262d;
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .question {
            font-size: 1.35rem;
            margin-bottom: 30px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option-btn {
            background-color: #1c2538;
            border: 2px solid #30363d;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-color);
            transition: all 0.2s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-blue);
            background-color: #222d44;
            transform: translateY(-2px);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .option-btn.correct-choice {
            background-color: rgba(46, 160, 67, 0.15);
            border-color: var(--correct-color);
            color: #56d364;
        }

        .option-btn.wrong-choice {
            background-color: rgba(248, 81, 73, 0.15);
            border-color: var(--wrong-color);
            color: #ff7b72;
        }

        .feedback {
            margin-top: 25px;
            font-weight: 700;
            font-size: 1.2rem;
            min-height: 30px;
            animation: fadeIn 0.3s ease;
        }

        .correct { color: #56d364; }
        .wrong { color: #ff7b72; }
        .hidden { display: none !important; }

        .nav-btn {
            background: linear-gradient(45deg, #0052d4, #4364f7, #6fb1fc);
            background-size: 200% auto;
            border: none;
            color: white;
            padding: 14px 32px;
            border-radius: 99px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 15px rgba(67, 100, 247, 0.4);
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 100, 247, 0.6);
        }

        .subject-btn {
            text-align: left;
            font-size: 1rem;
            background: #1c2538;
            border: 2px solid #30363d;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            width: 100%;
            display: block;
            box-sizing: border-box;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div id="subject-selection">
        <h2>Lern-Quests</h2>
        <p class="subtitle">Wähle eine Lerneinheit (Klasse 9)</p>
        
        <div class="subject-section">
            <div class="subject-title">📐 Mathematik</div>
            <button class="option-btn subject-btn" onclick="startGame('mathe_funktionen')">🔹 Quadratische Funktionen & Gleichungen</button>
            <button class="option-btn subject-btn" onclick="startGame('mathe_geometrie')">🔹 Satz des Pythagoras & Trigonometrie</button>
        </div>

        <div class="subject-section">
            <div class="subject-title">🇬🇧 Englisch</div>
            <button class="option-btn subject-btn" onclick="startGame('englisch_grammatik')">🔹 Passiv & Conditional Clauses (If-Sätze)</button>
            <button class="option-btn subject-btn" onclick="startGame('englisch_vokabeln')">🔹 Advanced Vocabulary & Phrasal Verbs</button>
        </div>

        <div class="subject-section">
            <div class="subject-title">⏳ Geschichte</div>
            <button class="option-btn subject-btn" onclick="startGame('geschichte_weimar')">🔹 Die Weimarer Republik</button>
            <button class="option-btn subject-btn" onclick="startGame('geschichte_ww2')">🔹 Der Nationalsozialismus & 2. Weltkrieg</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header">
            <span id="score-display">Score: 0</span>
            <span id="hearts-display">❤️❤️❤️</span>
        </div>
        <div class="progress-bar"><div id="progress" class="progress"></div></div>
        <div id="question" class="question">Frage lädt...</div>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" class="nav-btn hidden" onclick="nextQuestion()">Weiter</button>
    </div>

    <div id="end-screen" class="hidden">
        <h2 id="end-title">Auswertung</h2>
        <p id="end-message" style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6;"></p>
        <button class="nav-btn" onclick="resetGame()">Zur Themenübersicht</button>
    </div>
</div>

<script>
// Erweiterte Fragen-Datenbank sortiert nach Duolingo-Subthemen (Niveau Klasse 9)
const questionsBank = {
    mathe_funktionen: [
        { q: "Welche Form hat der Graph einer quadratischen Funktion f(x) = x²?", a: ["Gerade", "Parabel", "Hyperbel", "Kreis"], c: "Parabel" },
        { q: "Wie lauten die Lösungen der Gleichung x² − 9 = 0?", a: ["x = 3", "x = -3", "x = 3 und x = -3", "Es gibt keine Lösung"], c: "x = 3 und x = -3" },
        { q: "Was gibt der Scheitelpunkt einer nach oben geöffneten Parabel an?", a: ["Den höchsten Punkt", "Den tiefsten Punkt", "Die Nullstelle", "Den Schnittpunkt mit der y-Achse"], c: "Den tiefsten Punkt" },
        { q: "Welche Formel nutzt man standardmäßig zum Lösen einer gemischt-quadratischen Gleichung (x² + px + q = 0)?", a: ["Mitternachtsformel", "pq-Formel", "Satz des Thales", "Binomische Formel"], c: "pq-Formel" }
    ],
    mathe_geometrie: [
        { q: "Wie lautet die Formel des Satzes von Pythagoras für ein rechtwinkliges Dreieck mit den Katheten a, b und der Hypotenuse c?", a: ["a + b = c", "a² + b² = c²", "a² - b² = c²", "a • b = c²"], c: "a² + b² = c²" },
        { q: "In einem rechtwinkligen Dreieck ist das Verhältnis von Gegenkathete zu Hypotenuse definiert als...", a: ["Tangens", "Cosinus", "Sinus", "Pythagoras"], c: "Sinus" },
        { q: "Ein rechtwinkliges Dreieck hat die Katheten a = 3 cm und b = 4 cm. Wie lang ist die Hypotenuse c?", a: "5 cm", a: ["5 cm", "7 cm", "25 cm", "6 cm"], c: "5 cm" }
    ],
    englisch_grammatik: [
        { q: "Bilde das Passiv: 'The chef cooks the food.'", a: ["The food was cooked by the chef.", "The food is cooked by the chef.", "The food is cooking the chef.", "The food has been cooked."], c: "The food is cooked by the chef." },
        { q: "Welche Form ist grammatikalisch korrekt für einen If-Clause Typ 2?", a: ["If I have time, I will go.", "If I had time, I would go.", "If I would have time, I went.", "If I had had time, I would have gone."], c: "If I had time, I would go." },
        { q: "Ergänze sinnvoll: 'If it rains tomorrow, we ... the match.'", a: ["would cancel", "will cancel", "canceled", "canceling"], c: "will cancel" }
    ],
    englisch_vokabeln: [
        { q: "Was bedeutet das Phrasal Verb 'to give up'?", a: ["nachgeben", "aufgeben", "verteilen", "mitbringen"], c: "aufgeben" },
        { q: "Was ist das korrekte Synonym für 'environment'?", a: ["Development", "Surroundings / Nature", "Government", "Pollution"], c: "Surroundings / Nature" },
        { q: "Was bedeutet das Wort 'consequence' auf Deutsch?", a: ["Reihenfolge", "Konsequenz / Auswirkung", "Gerechtigkeit", "Zustimmung"], c: "Konsequenz / Auswirkung" }
    ],
    geschichte_weimar: [
        { q: "In welchem Jahr wurde die Weimarer Republik gegründet?", a: ["1914", "1918", "1923", "1933"], c: "1918" },
        { q: "Welches Ereignis im Jahr 1929 stürzte die Weimarer Republik in eine schwere Krise?", a: ["Der Hitler-Putsch", "Die Weltwirtschaftskrise", "Der Vertrag von Versailles", "Die Ermordung Walther Rathenaus"], c: "Die Weltwirtschaftskrise" },
        { q: "Wie hieß die erste demokratische Verfassung in Deutschland?", a: ["Grundgesetz", "Weimarer Reichsverfassung", "Paulskirchenverfassung", "Bundesvertrag"], c: "Weimarer Reichsverfassung" }
    ],
    geschichte_ww2: [
        { q: "An welchem genauen Datum begann der Zweite Weltkrieg mit dem Überfall auf Polen?", a: ["1. November 1938", "1. September 1939", "8. Mai 1945", "30. Januar 1933"], c: "1. September 1939" },
        { q: "Wie wurde die Ernennung Adolf Hitlers zum Reichskanzler am 30. Januar 1933 genannt?", a: ["Machtergreifung", "Gleichschaltung", "Ermächtigungsgesetz", "Münchner Abkommen"], c: "Machtergreifung" },
        { q: "In welchem Jahr endete der Zweite Weltkrieg in Europa?", a: ["1944", "1945", "1946", "1950"], c: "1945" }
    ]
};

let currentQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let hearts = 3;

function startGame(subject) {
    currentQuestions = [...questionsBank[subject]];
    currentQuestionIndex = 0;
    score = 0;
    hearts = 3;
    
    document.getElementById("subject-selection").classList.add("hidden");
    document.getElementById("end-screen").classList.add("hidden");
    document.getElementById("quiz-screen").classList.remove("hidden");
    
    updateHeader();
    showQuestion();
}

function showQuestion() {
    document.getElementById("feedback").innerText = "";
    document.getElementById("next-btn").classList.add("hidden");
    
    let currentQ = currentQuestions[currentQuestionIndex];
    document.getElementById("question").innerText = currentQ.q;
    
    let progressPercent = (currentQuestionIndex / currentQuestions.length) * 100;
    document.getElementById("progress").style.width = progressPercent + "%";
    
    let optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    
    currentQ.a.forEach(option => {
        let btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = option;
        btn.onclick = () => checkAnswer(btn, option, currentQ.c);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selectedBtn, chosenOption, correctOption) {
    let buttons = document.querySelectorAll(".option-btn");
    buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === correctOption) {
            btn.classList.add("correct-choice");
        }
    });
    
    let feedback = document.getElementById("feedback");
    
    if (chosenOption === correctOption) {
        feedback.innerText = "Hervorragend! 🎉";
        feedback.className = "feedback correct";
        score += 10;
    } else {
        selectedBtn.classList.add("wrong-choice");
        feedback.innerText = "Das war leider falsch. 😢";
        feedback.className = "feedback wrong";
        hearts--;
    }
    
    updateHeader();
    
    // Bugfix: Zeige den "Weiter"-Button NUR, wenn der Spieler noch Herzen hat
    if (hearts <= 0) {
        document.getElementById("next-btn").classList.add("hidden");
        setTimeout(() => endGame(false), 1200);
    } else {
        document.getElementById("next-btn").classList.remove("hidden");
    }
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < currentQuestions.length && hearts > 0) {
        showQuestion();
    } else if (hearts > 0) {
        document.getElementById("progress").style.width = "100%";
        setTimeout(() => endGame(true), 400);
    }
}

function updateHeader() {
    document.getElementById("score-display").innerText = `Score: ${score}`;
    document.getElementById("hearts-display").innerText = "❤️".repeat(hearts) + "💔".repeat(3 - hearts);
}

function endGame(win) {
    document.getElementById("quiz-screen").classList.add("hidden");
    document.getElementById("end-screen").classList.remove("hidden");
    
    let title = document.getElementById("end-title");
    let msg = document.getElementById("end-message");
    
    if (win) {
        title.innerText = "Quest abgeschlossen! 🏆";
        msg.innerText = `Großartige Leistung! Du hast alle Fragen dieser Lerneinheit gemeistert und dein Punktekonto auf ${score} erhöht.`;
    } else {
        title.innerText = "Nächster Versuch! 🕹️";
        msg.innerText = "Alle Herzen sind aufgebraucht. Kein Problem – lerne aus den Fehlern und starte einfach eine neue Runde!";
    }
}

function resetGame() {
    document.getElementById("end-screen").classList.add("hidden");
    document.getElementById("subject-selection").classList.remove("hidden");
}
</script>

</body>
</html>
