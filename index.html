<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Learn Quest - Klasse 9</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
    <div id="subject-selection">
        <h2>Lern-Quests</h2>
        <p class="subtitle">Wähle eine Lerneinheit (Klasse 9)</p>
        
        <div class="subject-section">
            <div class="subject-title">📐 Mathematik</div>
            <button class="option-btn subject-btn" onclick="startGame('mathe_funktionen')">🔹 Quadratische Funktionen & Gleichungen</button>
            <button class="option-btn subject-btn" onclick="startGame('mathe_geometrie')">🔹 Satz des Pythagoras & Trigonometrie</button>
        </div>

        <div class="subject-section">
            <div class="subject-title">🇬🇧 Englisch</div>
            <button class="option-btn subject-btn" onclick="startGame('englisch_grammatik')">🔹 Passiv & Conditional Clauses (If-Sätze)</button>
            <button class="option-btn subject-btn" onclick="startGame('englisch_vokabeln')">🔹 Advanced Vocabulary & Phrasal Verbs</button>
        </div>

        <div class="subject-section">
            <div class="subject-title">⏳ Geschichte</div>
            <button class="option-btn subject-btn" onclick="startGame('geschichte_weimar')">🔹 Die Weimarer Republik</button>
            <button class="option-btn subject-btn" onclick="startGame('geschichte_ww2')">🔹 Der Nationalsozialismus & 2. Weltkrieg</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header">
            <span id="score-display">Score: 0</span>
            <span id="hearts-display">❤️❤️❤️</span>
        </div>
        <div class="progress-bar"><div id="progress" class="progress"></div></div>
        <div id="question" class="question">Frage lädt...</div>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" class="nav-btn hidden" onclick="nextQuestion()">Weiter</button>
    </div>

    <div id="end-screen" class="hidden">
        <h2 id="end-title">Auswertung</h2>
        <p id="end-message" style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6;"></p>
        <button class="nav-btn" onclick="resetGame()">Zur Themenübersicht</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
