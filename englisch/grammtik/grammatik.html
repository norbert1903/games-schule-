<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passiv & Conditional Clauses</title>
    <link rel="stylesheet" href="englisch-style.css">
</head>
<body>
<div class="game-container">
    <div id="quiz-screen">
        <div class="header">
            <span id="score-display">Score: 0</span>
            <span id="hearts-display">❤️❤️❤️</span>
        </div>
        <div class="progress-bar"><div id="progress" class="progress"></div></div>
        <div id="question" class="question">Lade Quest...</div>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" class="nav-btn hidden" onclick="nextQuestion()">Weiter</button>
    </div>
    <div id="end-screen" class="hidden">
        <h2 id="end-title">Auswertung</h2>
        <p id="end-message"></p>
        <button class="nav-btn" onclick="window.close()">Quest beenden</button>
    </div>
</div>
<script src="englisch-script.js"></script>
<script>window.onload = () => startGame('englisch_grammatik');</script>
</body>
</html>
